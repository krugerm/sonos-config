name: Release artifacts

# Builds installable artifacts on every version tag and attaches them to the
# GitHub release. Also runnable manually (workflow_dispatch) to smoke-test the
# builds without cutting a tag — those runs publish downloadable artifacts only.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Universal release APK (debug-signed — installable by sideload; enable
      # "install unknown apps"). A Play upload key is a separate, later step.
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk sonos-config.apk
      - uses: actions/upload-artifact@v7
        with:
          name: sonos-config-android
          path: sonos-config.apk
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sonos-config.apk
          fail_on_unmatched_files: true

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      # Unsigned/un-notarized: first launch needs right-click → Open (Gatekeeper).
      # Signing + notarization needs an Apple Developer cert (separate step).
      - run: flutter build macos --release
      - name: Zip the app
        run: ditto -c -k --keepParent "build/macos/Build/Products/Release/Sonos Config.app" sonos-config-macos.zip
      - uses: actions/upload-artifact@v7
        with:
          name: sonos-config-macos
          path: sonos-config-macos.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sonos-config-macos.zip
          fail_on_unmatched_files: true

  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Unsigned build — no Apple certs in CI. The resulting .ipa is NOT directly
      # installable; it must be re-signed (AltStore / Sideloadly with a free Apple
      # ID, or your own Apple Developer account) before it will run on a device.
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R "build/ios/iphoneos/Runner.app" Payload/
          zip -r -q sonos-config-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v7
        with:
          name: sonos-config-ios
          path: sonos-config-ios-unsigned.ipa
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sonos-config-ios-unsigned.ipa
          fail_on_unmatched_files: true
