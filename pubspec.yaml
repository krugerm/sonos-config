name: personal_sonos
description: A Flutter app to discover and configure Sonos speakers over their local UPnP interface.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # UPnP/SOAP control of Sonos speakers is HTTP + XML. These two packages
  # cover 90% of the wire work; SSDP discovery is done over a raw UDP socket
  # (dart:io) because Sonos has a few quirks that generic UPnP packages miss.
  http: ^1.2.2
  xml: ^6.5.0

  # State management.
  provider: ^6.1.2

  # Used to learn the device's own Wi-Fi IP/subnet so we can fall back to a
  # unicast /24 scan when the network drops SSDP multicast (common on
  # enterprise / mesh Wi-Fi).
  network_info_plus: ^6.1.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# App icon: Sonos-evocative dark tile + sound-wave rings, overlaid with a
# topology "constellation" (coordinator hub + bonded satellites) in a cyan→green
# gradient. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon_fullbleed.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon_fullbleed.png"
  macos:
    generate: true
    image_path: "assets/icon/icon_macos.png"
  windows:
    generate: true
    image_path: "assets/icon/icon_fullbleed.png"
